<!DOCTYPE html>
<html lang="en">
<head>
  <title>Café Quiz</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="recipes.css">
        <link rel="icon" href="assets/images/logo.png" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        
        <!-- Official Font Awesome CDN -->



    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
     <title>Café Quiz</title>   
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(to right, #b07a4f, #5c3317);
    }

    .quiz {
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      height: 100vh;
      width: 100%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      position: absolute;
      opacity: 0;
      transform: translateX(100%);
      transition: 0.4s ease;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
    }

    button {
      font-family: "League Spartan", sans-serif; 
      background:  #ffd699;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      width: 80%;
      max-width: 320px;
      margin: 10px auto;
      cursor: pointer;

   box-shadow:
       0 6px 18px rgba(0, 0, 0, 0.18),
       inset 0 1px 0 rgba(255, 255, 255, 0.2);

  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

   button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

   button:active {
      transform: scale(0.97);
}

    .result {
      transition: background 0.4 ease;
    }
  </style>
</head>

<body>

  
  <div class="quiz">

    <section class="slide active">
  <h1>How do you take your drink?</h1>
  <button onclick="choose('temp','hot')">🔥 Cozy & warm</button>
  <button onclick="choose('temp','cold')">❄️ Iced & chilled</button>
</section>

<section class="slide">
  <h1>What's your current mood?</h1>
  <button onclick="choose('vibe','soft')">🌙 Calm & quiet</button>
  <button onclick="choose('vibe','balanced')">☯️ Steady & grounded</button>
  <button onclick="choose('vibe','chaotic')">⚡ Loud & extra</button>
</section>

<section class="slide">
  <h1>What sounds good right now?</h1>
  <button onclick="choose('taste','sweet')">🍫 Sweet & indulgent</button>
  <button onclick="choose('taste','bitter')">🍵 Clean & earthy</button>
  <button onclick="choose('taste','bittersweet')">🍮 Sweet with a kick</button>
</section>

<section class="slide">
  <h1>What do you need from your drink?</h1>
  <button onclick="choose('energy','low')">😌 Just need to unwind</button>
  <button onclick="choose('energy','medium')">🚶 Getting through the day</button>
  <button onclick="choose('energy','high')">🚀 Full send</button>
</section>

    <section class="slide result">
      <h1 id="finalDrink"></h1>
      <p id="drinkDesc"></p>
      <img id="drinkImg" src="" alt="Your Drink" style="width:500px; height:500px; border-radius:15px; margin: auto">
      <button onclick="restart()">Take again</button>
      <button onclick = "goToRecipes()">Back to Recipes</button>
    </section>

  </div>

 
  <script>
  let index = 0;
const slides = document.querySelectorAll(".slide");

let scores = { matcha: 0, choco: 0, caramel: 0 };

function choose(type, value) {

  if (type === "temp") {
    if (value === "hot")  scores.caramel += 3;
    if (value === "cold") scores.choco   += 3;
  }

  if (type === "vibe") {
    if (value === "soft")     scores.matcha  += 2;
    if (value === "balanced") scores.caramel += 2;
    if (value === "chaotic")  scores.choco   += 2;
  }

  if (type === "taste") {
    if (value === "sweet")       { scores.choco   += 3; scores.caramel += 1; }
    if (value === "bitter")        scores.matcha  += 3;
    if (value === "bittersweet") { scores.caramel += 3; scores.matcha  += 1; }
  }

  if (type === "energy") {
    if (value === "low")    scores.matcha  += 1;
    if (value === "medium") scores.caramel += 1;
    if (value === "high")   scores.choco   += 1;
  }

  slides[index].classList.remove("active");
  index++;
  slides[index].classList.add("active");

  if (slides[index].classList.contains("result")) {
    showResult();
  }
}

function showResult() {
  const resultSlide = document.querySelector(".slide.result");

  // find the winner
  const winner = Object.entries(scores).reduce((a, b) => b[1] > a[1] ? b : a)[0];

  const drinks = {
    matcha: {
      name: "Matcha 🍵",
      desc: "Calm, grounded, and effortlessly aesthetic.",
      img:  "assets/images/matcha.png",
      bg:   "#7BAE7F"
    },
    choco: {
      name: "Choco Frappe 🍫",
      desc: "Fun, bold, and full of energy.",
      img:  "assets/images/frappee.png",
      bg:   "#3B2416"
    },
    caramel: {
      name: "Caramel Macchiato 🍮",
      desc: "Warm, balanced, and comforting.",
      img:  "assets/images/caramel.png",
      bg:   "#C68C53"
    }
  };

  const result = drinks[winner];
  resultSlide.style.background = result.bg;
  document.getElementById("finalDrink").textContent = result.name;
  document.getElementById("drinkDesc").textContent  = result.desc;
  document.getElementById("drinkImg").src           = result.img;
}

function restart() {
  index = 0;
  scores = { matcha: 0, choco: 0, caramel: 0 };
  slides.forEach(s => s.classList.remove("active"));
  slides[0].classList.add("active");
}

function goToRecipes() {
  window.location.href = "recipes.html";
}
</script>
</body>
</html>
